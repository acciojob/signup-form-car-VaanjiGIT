<!DOCTYPE html>
<html lang="en">
<head>
	<h1>Signup Form</h1>
</head>
<body>

	<from method="post">

		<!--Name-->
		<label for = "name">Name:</label>
		<input type="text" id="name" placeholder="Name" required>
		<br><br>

		<!--Email-->
		<label for ="email">Email:</label>
		<input type="email" id="name" placeholder="Email" required>
		<br><br>

		<!--Gender-->
		<label>Gender:</label>
		<label for = "gender_m">Male</label>
		<input type="radio" id="gender_m" name="gender" required>

		<label for="gender_f">Female</label>
		<input type="radio" id="gender_f" name="gender" required>
		<br><br>

		<!--Car Brands-->
		<label for="cars">Cars Brands:</label>
		<select id="cars" required>
			<option value="">--Please choose an option</option>
			<option value="bmw">BMW</option>
			<option value="tata">TATA</option>
			<option value="mahindra">Mahindra</option>
			<option value="maruti">Maruti</option>
		</select>
		<br><br>

		<!-- Age -->
		<label for="age">Age:</label>
		<input type="number" id="age" placeholder="Age" required>
		<br><br>

		<!--Dob-->
		<label for="dob">Date of Birth:</label>
		<input type="date" id="dob" required>
		<br><br>

		<!--Phone Number-->
		<lable for="tel">Phone Number:</lable>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		<br><br>

		<!-- Password -->
		<label for="password">Password:</label>
		<input type="password" id="password" placeholder="Password" required>
		<br><br>

		<!-- TOS-->
		<label for="tos">I agree to the TOS</label>
		<input type="checkbox" id="tos" required>
		<br><br>
		
		<!-- Submit Button-->
		<button type="submit">Submit</button>

	</from>	
</body>
</html>
